name: CI Firmware

on:
  push:
  pull_request:

jobs:

# =========================================================
# ANALYSIS
# =========================================================
  analysis:
    name: Static Analysis + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache build (analysis)
        uses: actions/cache@v4
        with:
          path: |
            build/tidy
            build/tests
          key: ${{ runner.os }}-analysis-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y \
            cmake ninja-build \
            clang clang-tidy clang-format \
            cppcheck

# ---------------------------------------------------------
# FORMAT CHECK (clang-format)
# ---------------------------------------------------------
      - name: Check formatting
        run: |
          FILES=$(find firmware tests \
            \( -name "*.cpp" -o -name "*.hpp" -o -name "*.c" -o -name "*.h" \) \
            -not -path "*/cmsis/*" \
            -not -path "*/linker/*" \
            -not -path "*/startup/*"
          )
          clang-format -i -style=file:scripts/config/clang-format.yaml $FILES

# ---------------------------------------------------------
# CLANG-TIDY (ANALYSIS ONLY)
# ---------------------------------------------------------
      - name: Configure CMake (clang-tidy)
        run: |
          cmake -B build/tidy \
            -G Ninja \
            -DANALYSIS=ON \
            -DTESTS=OFF \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          FILES=$(find firmware/core firmware/services -name "*.cpp" -o -name "*.c")
          for file in $FILES; do
            clang-tidy \
              -p build/tidy \
              --config-file=scripts/config/clang-tidy.yaml \
              "$file"
          done

# ---------------------------------------------------------
# TESTS (ASAN + UBSAN)
# ---------------------------------------------------------
      - name: Configure tests
        run: |
          cmake -B build/tests \
            -G Ninja \
            -DANALYSIS=ON \
            -DTESTS=ON \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build tests
        run: cmake --build build/tests

      - name: Run tests
        run: ctest --test-dir build/tests --output-on-failure

# ---------------------------------------------------------
# CPPCHECK
# ---------------------------------------------------------
      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability,style \
            --inconclusive \
            --std=c++17 \
            --force \
            --error-exitcode=1 \
            firmware/core firmware/services tests

# =========================================================
# FIRMWARE BUILD (ARM)
# =========================================================
  firmware:
    name: Firmware Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache build (firmware)
        uses: actions/cache@v4
        with:
          path: build/firmware
          key: ${{ runner.os }}-firmware-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Install ARM toolchain
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi cmake ninja-build

      - name: Configure firmware
        run: |
          cmake -B build/firmware \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=cmake/arm-gcc-toolchain.cmake

      - name: Build firmware
        run: cmake --build build/firmware

      - name: Firmware size
        run: arm-none-eabi-size build/firmware/*.elf

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/firmware/*.elf
            build/firmware/*.bin
            build/firmware/*.hex